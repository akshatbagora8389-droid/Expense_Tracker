<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses — ExpenseIQ</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">💰</div>
                ExpenseIQ
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-link">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
                <a href="/income-page" class="nav-link">
                    <span class="nav-icon">💵</span> Income
                </a>
                <a href="/expenses-page" class="nav-link active">
                    <span class="nav-icon">💳</span> Expenses
                </a>
                <a href="/advisor-page" class="nav-link">
                    <span class="nav-icon">🤖</span> AI Advisor
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <span class="user-name" id="user-name">User</span>
                </div>
                <button class="btn-logout" onclick="handleLogout()">
                    🚪 Sign Out
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>💳 Expenses</h1>
                <p>Track and manage all your spending</p>
            </div>

            <!-- Add Expense Form -->
            <div class="add-form-card">
                <h3>Add New Expense</h3>
                <form id="add-expense-form" onsubmit="handleAddExpense(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="expense-category">Category</label>
                            <select id="expense-category" required>
                                <option value="">Select category</option>
                                <option value="Food">🍔 Food</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Bills">📄 Bills</option>
                                <option value="Entertainment">🎬 Entertainment</option>
                                <option value="Health">🏥 Health</option>
                                <option value="Education">📚 Education</option>
                                <option value="Rent">🏠 Rent</option>
                                <option value="Other">📌 Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="expense-amount">Amount (₹)</label>
                            <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="expense-date">Date</label>
                            <input type="date" id="expense-date" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="expense-desc">Description (optional)</label>
                        <input type="text" id="expense-desc" placeholder="Brief note about this expense">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-danger" id="add-expense-btn"
                            style="padding:12px 24px; font-size:0.95rem; border-radius:12px;">
                            ➕ Add Expense
                        </button>
                    </div>
                    <div class="form-error" id="expense-form-error"></div>
                </form>
            </div>

            <!-- Expenses Table -->
            <div class="data-card">
                <h3>Expense History</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-tbody">
                        <tr>
                            <td colspan="5">
                                <div class="empty-state">
                                    <div class="empty-icon">💳</div>
                                    <h3>No expenses yet</h3>
                                    <p>Add your first expense entry above</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="/js/expenses.js"></script>
</body>

</html>
