<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Expenses — ExpenseIQ</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#1a5319",
                    "on-secondary-fixed-variant": "#930000",
                    "on-secondary": "#ffffff",
                    "on-tertiary-container": "#7bc1d7",
                    "primary-fixed": "#b3f3a6",
                    "outline-variant": "#c1c9bb",
                    "tertiary-container": "#004f60",
                    "surface": "#fbf9f4",
                    "primary-fixed-dim": "#98d68c",
                    "on-surface-variant": "#41493e",
                    "on-surface": "#1b1c19",
                    "on-secondary-container": "#fffbff",
                    "outline": "#71796d",
                    "on-tertiary-fixed": "#001f27",
                    "surface-container": "#f0eee9",
                    "secondary": "#bb0402",
                    "surface-bright": "#fbf9f4",
                    "secondary-fixed": "#ffdad4",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#002202",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e4e2dd",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#30312e",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#185218",
                    "tertiary-fixed-dim": "#8bd1e8",
                    "on-secondary-fixed": "#410000",
                    "surface-container-high": "#eae8e3",
                    "surface-dim": "#dbdad5",
                    "inverse-on-surface": "#f2f1ec",
                    "tertiary-fixed": "#b2ebff",
                    "surface-container-highest": "#e4e2dd",
                    "primary": "#003b05",
                    "surface-tint": "#326a2d",
                    "secondary-container": "#e02a1b",
                    "tertiary": "#003743",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#ffb4a8",
                    "on-tertiary-fixed-variant": "#004e5f",
                    "on-primary-container": "#89c67e",
                    "background": "#fbf9f4",
                    "surface-container-low": "#f5f3ee",
                    "on-background": "#1b1c19",
                    "inverse-primary": "#98d68c"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "16px",
                    "xl": "24px",
                    "full": "9999px"
            },
            "spacing": {
                    "sidebar-width": "260px",
                    "margin-mobile": "16px",
                    "margin-desktop": "32px",
                    "card-padding": "24px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "body-sm": ["Manrope"],
                    "display": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "headline-lg-mobile": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "headline-lg": ["Manrope"],
                    "label-caps": ["Manrope"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #fbf9f4; color: #1b1c19; }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
        }
        .card-shadow {
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 16px 24px;
            border-radius: 12px;
            color: #1b1c19;
            font-size: 0.92rem;
            font-weight: 700;
            z-index: 3000;
            transform: translateY(100px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .toast.error {
            border-left: 4px solid #ba1a1a;
            color: #ba1a1a;
        }
        .toast.success {
            border-left: 4px solid #003b05;
            color: #003b05;
        }
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(44, 37, 32, 0.12);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(44, 37, 32, 0.24);
        }
        #expense-form-error.show {
            display: block !important;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Category Badges Styling */
        .badge-cat {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .badge-cat-food { background: rgba(180, 83, 9, 0.08); color: #B45309; }
        .badge-cat-transport { background: rgba(26, 95, 122, 0.08); color: #1A5F7A; }
        .badge-cat-shopping { background: rgba(124, 58, 237, 0.08); color: #7C3AED; }
        .badge-cat-bills { background: rgba(220, 38, 38, 0.08); color: #DC2626; }
        .badge-cat-entertainment { background: rgba(219, 39, 119, 0.08); color: #DB2777; }
        .badge-cat-health { background: rgba(5, 150, 105, 0.08); color: #059669; }
        .badge-cat-education { background: rgba(37, 99, 235, 0.08); color: #2563EB; }
        .badge-cat-rent { background: rgba(79, 70, 229, 0.08); color: #4F46E5; }
        .badge-cat-other { background: rgba(107, 114, 128, 0.08); color: #6B7280; }

        /* Mobile-specific performance & layout enhancements */
        @media (max-width: 767px) {
            header {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                background: #fbf9f4 !important;
            }
            button, a, select, input {
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
            }
            .bento-grid {
                gap: 16px !important;
            }
        }

        /* Desktop collapse sidebar styles */
        @media (min-width: 768px) {
            body:not(.sidebar-collapsed) #sidebar-toggle-btn {
                display: none;
            }
            body.sidebar-collapsed #sidebar {
                transform: translateX(-100%);
            }
            body.sidebar-collapsed main {
                margin-left: 0 !important;
            }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-[260px] border-r border-outline-variant/30 bg-surface-container-low flex flex-col py-8 px-4 gap-2 z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="mb-10 px-4 flex items-center justify-between">
            <div>
                <h1 class="font-headline-md text-headline-md font-extrabold text-primary">ExpenseIQ</h1>
                <p class="text-body-sm text-on-surface-variant">Financial Clarity</p>
            </div>
            <button id="sidebar-collapse-btn" class="p-1 text-on-surface-variant hover:text-primary rounded-full focus:outline-none transition-colors" aria-label="Collapse sidebar">
                <span class="material-symbols-outlined text-[28px] !leading-none block">dock_to_right</span>
            </button>
        </div>
        <nav class="flex-1 flex flex-col gap-1">
            <a class="text-on-surface-variant hover:bg-surface-container-high hover:text-primary px-4 py-2 flex items-center gap-3 rounded-full transition-colors duration-200" href="/dashboard">
                <span class="w-5 h-5 flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                </span>
                <span class="font-body-lg text-body-lg tracking-tight">Dashboard</span>
            </a>
            <a class="text-on-surface-variant hover:bg-surface-container-high hover:text-primary px-4 py-2 flex items-center gap-3 rounded-full transition-colors duration-200" href="/income-page">
                <span class="w-5 h-5 flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                        <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
                    </svg>
                </span>
                <span class="font-body-lg text-body-lg tracking-tight">Income</span>
            </a>
            <a class="bg-primary-container/10 text-primary font-bold rounded-full px-4 py-2 flex items-center gap-3 transition-transform duration-150 scale-100 active:scale-95" href="/expenses-page">
                <span class="w-5 h-5 flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                    </svg>
                </span>
                <span class="font-body-lg text-body-lg tracking-tight">Expenses</span>
            </a>
            <a class="text-on-surface-variant hover:bg-surface-container-high hover:text-primary px-4 py-2 flex items-center gap-3 rounded-full transition-colors duration-200" href="/advisor-page">
                <span class="w-5 h-5 flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                    </svg>
                </span>
                <span class="font-body-lg text-body-lg tracking-tight">AI Advisor</span>
            </a>
        </nav>
        
        <!-- Profile & Sign Out Section -->
        <div class="mt-auto pt-4 border-t border-outline-variant/30 flex flex-col gap-3">
            <div class="flex items-center gap-3 px-2">
                <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold text-[18px]" id="user-avatar">U</div>
                <span class="font-body-lg font-bold text-on-surface-variant truncate" id="user-name">User</span>
            </div>
            <button onclick="handleLogout()" class="w-full py-2 bg-error-container/10 border border-error/20 text-error hover:bg-error/10 px-4 flex items-center justify-center gap-2 rounded-full font-bold text-body-sm transition-colors duration-200">
                <span class="material-symbols-outlined text-[18px]" data-icon="logout">logout</span>
                <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <!-- Sidebar Overlay for Mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden md:hidden transition-opacity duration-300"></div>

    <!-- Main Content Area -->
    <main class="ml-0 md:ml-[260px] min-h-screen relative transition-all duration-300">
        <!-- Top App Bar -->
        <header class="sticky top-0 right-0 h-20 w-full z-40 backdrop-blur-md bg-surface/80 flex justify-between items-center px-4 md:px-margin-desktop border-b border-outline-variant/10">
            <div class="flex items-center gap-3">
                <button id="sidebar-toggle-btn" class="p-1 mr-1 text-on-surface-variant hover:text-primary rounded-full focus:outline-none transition-colors" aria-label="Toggle navigation">
                    <span class="material-symbols-outlined text-[28px] !leading-none block">dock_to_right</span>
                </button>
                <h2 class="font-headline-md text-headline-md font-bold text-primary">Expenses</h2>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-4 md:p-margin-desktop">
            <div class="bento-grid">
                <!-- Add Expense Form (left column) -->
                <div class="col-span-12 lg:col-span-4 bg-white rounded-xl p-card-padding card-shadow">
                    <h3 class="font-headline-md text-primary mb-6 text-xl font-bold">Add New Expense</h3>
                    <form id="add-expense-form" onsubmit="handleAddExpense(event)" class="space-y-4">
                        <div>
                            <label for="expense-category" class="block text-body-sm font-semibold text-on-surface-variant mb-2">Category</label>
                            <select id="expense-category" required class="w-full px-4 py-2 bg-surface-container-low border border-outline-variant/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 text-body-lg">
                                <option value="">Select category</option>
                                <option value="Food">🍔 Food</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Bills">📄 Bills</option>
                                <option value="Entertainment">🎬 Entertainment</option>
                                <option value="Health">🏥 Health</option>
                                <option value="Education">📚 Education</option>
                                <option value="Rent">🏠 Rent</option>
                                <option value="Other">📌 Other</option>
                            </select>
                        </div>
                        <div>
                            <label for="expense-amount" class="block text-body-sm font-semibold text-on-surface-variant mb-2">Amount (₹)</label>
                            <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0.01" required class="w-full px-4 py-2 bg-surface-container-low border border-outline-variant/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 text-body-lg">
                        </div>
                        <div>
                            <label for="expense-date" class="block text-body-sm font-semibold text-on-surface-variant mb-2">Date</label>
                            <input type="date" id="expense-date" required class="w-full px-4 py-2 bg-surface-container-low border border-outline-variant/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 text-body-lg">
                        </div>
                        <div>
                            <label for="expense-desc" class="block text-body-sm font-semibold text-on-surface-variant mb-2">Description (optional)</label>
                            <input type="text" id="expense-desc" placeholder="Brief note about this expense" class="w-full px-4 py-2 bg-surface-container-low border border-outline-variant/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 text-body-lg">
                        </div>
                        <button type="submit" id="add-expense-btn" class="w-full py-3 bg-primary text-white hover:bg-primary/90 font-bold rounded-full transition-all duration-200 mt-4 flex items-center justify-center gap-2">
                            Add Expense
                        </button>
                        <div class="text-error text-body-sm font-semibold mt-2 hidden" id="expense-form-error"></div>
                    </form>
                </div>

                <!-- Expenses Table (right column) -->
                <div class="col-span-12 lg:col-span-8 bg-white rounded-xl p-card-padding card-shadow">
                    <h3 class="font-headline-md text-primary mb-6 text-xl font-bold">Expense History</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-outline-variant/30 text-on-surface-variant font-semibold text-[14px]">
                                    <th class="pb-4">Category</th>
                                    <th class="pb-4">Amount</th>
                                    <th class="pb-4">Date</th>
                                    <th class="pb-4">Description</th>
                                    <th class="pb-4">Action</th>
                                </tr>
                            </thead>
                            <tbody id="expenses-tbody" class="divide-y divide-outline-variant/10 text-body-lg text-on-surface">
                                <tr>
                                    <td colspan="5" class="py-8 text-center text-on-surface-variant">Loading expense history...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="/js/utils.js"></script>
    <script src="/js/expenses.js"></script>
</body>
</html>
